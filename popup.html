<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Multi Notes</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <div class="header">
    <h2>📝 Notes 4 All</h2>
    <button id="addNote">+</button>
  </div>

  <div id="notesList"></div>

  <textarea id="noteContent" placeholder="Escreva sua nota..."></textarea>

  <button id="deleteNote" class="delete">Excluir Nota</button>
  <button id="captureScreen" class="capture">📸 Capturar Tela</button>
  

  <script src="popup.js"></script>
</body>
</html>
